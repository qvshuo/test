name: Build fcitx grammar model

on:
  schedule:
    - cron: '0 0 29 * *'
  workflow_dispatch:
    inputs:
      arpa_date:
        description: 'lm_sc.arpa date suffix, e.g. 20260629; leave empty to auto-detect today'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: build-fcitx-grammar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zstd python3 librime1

      - name: Checkout rime-build-grammar tools
        uses: actions/checkout@v4
        with:
          repository: gaboolic/rime-build-grammar
          path: rime-build-grammar

      - name: Resolve arpa date
        run: |
          if [ -n "${{ github.event.inputs.arpa_date }}" ]; then
            ARPA_DATE="${{ github.event.inputs.arpa_date }}"
          else
            ARPA_DATE="$(date -u +%Y%m%d)"
          fi
          echo "ARPA_DATE=$ARPA_DATE" >> "$GITHUB_ENV"
          echo "Using ARPA_DATE=$ARPA_DATE"

      - name: Download lm_sc.arpa from fcitx
        run: |
          wget --tries=3 --waitretry=5 --progress=dot:giga \
            "https://download.fcitx-im.org/data/lm_sc.arpa-${ARPA_DATE}.tar.zst" \
            -O "lm_sc.arpa-${ARPA_DATE}.tar.zst"

      - name: Extract lm_sc.arpa
        run: |
          zstd -d "lm_sc.arpa-${ARPA_DATE}.tar.zst" -o lm_sc.arpa.tar
          tar -xf lm_sc.arpa.tar
          ls -lh lm_sc.arpa

      - name: Convert arpa to Octagram ngrams
        run: |
          python3 rime-build-grammar/arpa.py lm_sc.arpa --output-dir output
          python3 rime-build-grammar/merge_ngram.py --input-dir output --orders 2 3
          ls -lh output/merge_2_3.txt

      - name: Build .gram
        run: |
          chmod +x rime-build-grammar/build_grammar.linux
          rime-build-grammar/build_grammar.linux fcitx-lm_sc < output/merge_2_3.txt
          ls -lh fcitx-lm_sc.gram

      - name: Upload .gram to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fcitx-lm_sc-${{ env.ARPA_DATE }}
          name: fcitx lm_sc grammar (${{ env.ARPA_DATE }})
          body: |
            RIME Octagram grammar model converted from fcitx5/libime
            `lm_sc.arpa-${{ env.ARPA_DATE }}`.
          files: fcitx-lm_sc.gram
          overwrite_files: true
