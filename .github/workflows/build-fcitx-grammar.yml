# Build fcitx grammar model for RIME
#
# WARNING: This workflow downloads lm_sc.arpa from fcitx-im.org, which is
# ~77 GB (compressed) for the 20260629 snapshot. Standard GitHub Actions
# runners only have ~14-20 GB of disk and will fail. To use this workflow
# you need either:
#   - a GitHub larger runner with at least 200 GB disk, or
#   - a self-hosted runner with sufficient disk and network.
#
# The input model is the fcitx5/libime language model (lm_sc.arpa). It is
# converted to RIME Octagram format (.gram) using the tools from
# gaboolic/rime-build-grammar.

name: Build fcitx grammar model

on:
  workflow_dispatch:
    inputs:
      arpa_date:
        description: 'lm_sc.arpa date suffix, e.g. 20260629'
        required: true
        default: '20260629'
        type: string
      release_tag:
        description: 'Release tag name'
        required: true
        default: 'fcitx-lm_sc'
        type: string

permissions:
  contents: write

jobs:
  build:
    # Standard runners do NOT have enough disk. Change this to a larger
    # runner or a self-hosted runner before running.
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zstd python3

      - name: Checkout rime-build-grammar tools
        uses: actions/checkout@v4
        with:
          repository: gaboolic/rime-build-grammar
          path: rime-build-grammar

      - name: Download lm_sc.arpa from fcitx
        run: |
          mkdir -p work
          cd work
          wget --progress=dot:giga \
            "https://download.fcitx-im.org/data/lm_sc.arpa-${{ github.event.inputs.arpa_date }}.tar.zst" \
            -O "lm_sc.arpa-${{ github.event.inputs.arpa_date }}.tar.zst"

      - name: Extract lm_sc.arpa
        run: |
          cd work
          zstd -d "lm_sc.arpa-${{ github.event.inputs.arpa_date }}.tar.zst" -o lm_sc.arpa.tar
          tar -xf lm_sc.arpa.tar
          ls -lh lm_sc.arpa

      - name: Convert arpa to Octagram ngrams
        run: |
          cd work
          python3 ../rime-build-grammar/arpa.py lm_sc.arpa --output-dir output
          python3 ../rime-build-grammar/merge_ngram.py --input-dir output --orders 2 3
          ls -lh merge_2_3.txt

      - name: Build .gram
        run: |
          cd work
          chmod +x ../rime-build-grammar/build_grammar.linux
          cat merge_2_3.txt | ../rime-build-grammar/build_grammar.linux lm_sc
          ls -lh lm_sc.gram

      - name: Upload .gram to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}-${{ github.event.inputs.arpa_date }}
          name: fcitx lm_sc grammar (${{ github.event.inputs.arpa_date }})
          body: |
            RIME Octagram grammar model converted from fcitx5/libime
            `lm_sc.arpa-${{ github.event.inputs.arpa_date }}`.
          files: work/lm_sc.gram
