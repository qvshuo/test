name: Build fcitx grammar model

on:
  workflow_dispatch:
    inputs:
      arpa_date:
        description: 'lm_sc.arpa date suffix, e.g. 20260629'
        required: true
        default: '20260629'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zstd python3 librime1

      - name: Checkout rime-build-grammar tools
        uses: actions/checkout@v4
        with:
          repository: gaboolic/rime-build-grammar
          path: rime-build-grammar

      - name: Build lm_sc.gram
        run: |
          mkdir -p work
          cd work
          wget "https://download.fcitx-im.org/data/lm_sc.arpa-${{ github.event.inputs.arpa_date }}.tar.zst" -O model.tar.zst
          zstd -d model.tar.zst -o model.tar
          tar -xf model.tar
          python3 ../rime-build-grammar/arpa.py lm_sc.arpa --output-dir output
          python3 ../rime-build-grammar/merge_ngram.py --input-dir output --orders 2 3
          chmod +x ../rime-build-grammar/build_grammar.linux
          ../rime-build-grammar/build_grammar.linux lm_sc < output/merge_2_3.txt
          mv lm_sc.gram ../lm_sc.gram

      - name: Commit generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lm_sc.gram
          git commit -m "build: update lm_sc.gram (${{ github.event.inputs.arpa_date }})" || exit 0
          git push
