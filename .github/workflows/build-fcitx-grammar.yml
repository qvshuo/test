name: Build fcitx grammar model

on:
  workflow_dispatch:
    inputs:
      arpa_date:
        description: '必填，格式 YYYYMMDD；下载路径前缀：https://download.fcitx-im.org/data/ ；文件名示例：lm_sc.arpa-20260629.tar.zst'
        required: true
        type: string
      release_tag:
        description: 'Release tag name'
        required: true
        default: 'fcitx-lm_sc'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Validate input
        run: |
          set -euo pipefail
          DATE="${{ github.event.inputs.arpa_date }}"
          if ! echo "$DATE" | grep -Eq '^[0-9]{8}$'; then
            echo "Invalid arpa_date: $DATE"
            echo "Expected format: YYYYMMDD"
            exit 1
          fi
          echo "Using date: $DATE"
          echo "Source URL: https://download.fcitx-im.org/data/lm_sc.arpa-$DATE.tar.zst"

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget zstd python3 librime1

      - name: Checkout rime-build-grammar tools
        uses: actions/checkout@v4
        with:
          repository: gaboolic/rime-build-grammar
          path: rime-build-grammar

      - name: Download lm_sc.arpa from fcitx
        run: |
          set -euo pipefail
          mkdir -p work
          cd work
          FILE="lm_sc.arpa-${{ github.event.inputs.arpa_date }}.tar.zst"
          URL="https://download.fcitx-im.org/data/${FILE}"
          echo "Downloading: $URL"
          wget --tries=3 --waitretry=5 --progress=dot:giga "$URL" -O "$FILE"

      - name: Extract lm_sc.arpa
        run: |
          set -euo pipefail
          cd work
          zstd -d "lm_sc.arpa-${{ github.event.inputs.arpa_date }}.tar.zst" -o lm_sc.arpa.tar
          tar -xf lm_sc.arpa.tar
          ls -lh lm_sc.arpa

      - name: Convert arpa to Octagram ngrams
        run: |
          set -euo pipefail
          cd work
          python3 ../rime-build-grammar/arpa.py lm_sc.arpa --output-dir output
          python3 ../rime-build-grammar/merge_ngram.py --input-dir output --orders 2 3
          ls -lh output/merge_2_3.txt

      - name: Build .gram
        run: |
          set -euo pipefail
          cd work
          chmod +x ../rime-build-grammar/build_grammar.linux
          ../rime-build-grammar/build_grammar.linux lm_sc < output/merge_2_3.txt
          ls -lh lm_sc.gram

      - name: Upload .gram to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}-${{ github.event.inputs.arpa_date }}
          name: fcitx lm_sc grammar (${{ github.event.inputs.arpa_date }})
          body: |
            RIME Octagram grammar model converted from fcitx5/libime
            Source: https://download.fcitx-im.org/data/
            File: lm_sc.arpa-${{ github.event.inputs.arpa_date }}.tar.zst
          files: work/lm_sc.gram
